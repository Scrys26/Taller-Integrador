; ============================================================
;  PlatformIO — iGate APRS-IS Firmware Propio
;  Plataforma: ESP32 (TTGO LoRa32 v2.1 / Heltec WiFi LoRa 32 v2)
; ============================================================

[env:ttgo-lora32-v21]
platform  = espressif32
board     = ttgo-lora32-v21
framework = arduino

; Velocidad de monitor serial
monitor_speed = 115200

; Dependencias (PlatformIO descarga automáticamente)
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9

; Flags de compilación
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0

; ── Heltec WiFi LoRa 32 v2 (descomentar si usas esta placa) ──
; [env:heltec-wifi-lora-32-v2]
; platform  = espressif32
; board     = heltec_wifi_lora_32_V2
; framework = arduino
; monitor_speed = 115200
; lib_deps =
